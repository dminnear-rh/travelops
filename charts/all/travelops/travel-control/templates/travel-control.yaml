apiVersion: apps/v1
kind: Deployment
metadata:
  name: control
spec:
  serviceAccountName: control
  selector:
    matchLabels:
      app: control
      version: v1
  replicas: 1
  template:
    metadata:
      annotations:
        readiness.status.sidecar.istio.io/applicationPorts: ""
      labels:
        app: control
        version: v1
    spec:
      containers:
        - name: control
          image: quay.io/kiali/demo_travels_control:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            privileged: false
            readOnlyRootFilesystem: true
          env:
            - name: PORTAL_SERVICES
              value: "voyages.fr;http://voyages.travel-portal:8000,viaggi.it;http://viaggi.travel-portal:8000,travels.uk;http://travels.travel-portal:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: control
  labels:
    app: control
spec:
  ports:
    - name: http
      port: 8080
  selector:
    app: control
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: control-gateway
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: control-ingress
spec:
  hosts:
    - "*"
  gateways:
    - control-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: control
            port:
              number: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: control-waypoint
  labels:
    istio.io/gateway-name: waypoint
spec:
  gatewayClassName: istio-mesh
  listeners:
    - name: mesh
      port: 15008
      protocol: MESH
  addresses:
    - type: Service
      value: control
