apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  name: default
spec:
  version: v1.24.3
  namespace: istio-system
  values:
    meshConfig:
      enableTracing: true
      extensionProviders:
        - name: zipkin
          zipkin:
            service: dev-collector.istio-system.svc.cluster.local
            port: 9411
      defaultProviders:
        tracing:
          - zipkin
      discoverySelectors:
        - matchLabels:
            istio-discovery: enabled
